name: Apply Drizzle Migrations

# 수동 실행 전용 — drizzle/ 마이그레이션을 운영 Turso DB에 적용.
# drizzle-kit migrate는 _journal 기준 미적용 마이그레이션만 증분 적용(idempotent).
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply facet_counts table
        run: node scripts/apply-facet-table.mjs
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Refresh facet counts (Bizinfo 무관, 기존 데이터 기반)
        run: pnpm tsx scripts/refresh-facets.ts
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
