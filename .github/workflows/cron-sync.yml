name: StartupMoneyMap cron

on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "15 * * * *"
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Cron task to run"
        required: true
        default: "sync"
        type: choice
        options:
          - sync
          - sync-events
          - refresh-status
          - generate-meta
          - submit-index

concurrency:
  group: startupmoneymap-cron-${{ github.event.schedule || github.event.inputs.task || 'manual' }}
  cancel-in-progress: false

jobs:
  sync:
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'sync') || (github.event.schedule == '*/30 * * * *' && vars.CRON_ENABLED == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Bizinfo sync
        run: pnpm tsx scripts/sync-bizinfo.ts --pageUnit=10
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

  sync-events:
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'sync-events') || (github.event.schedule == '15 * * * *' && vars.CRON_ENABLED == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Bizinfo event sync
        run: pnpm tsx scripts/sync-bizinfo-events.ts --pageUnit=10
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

  refresh-status:
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'refresh-status') || (github.event.schedule == '0 21 * * *' && vars.CRON_ENABLED == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call status refresh endpoint
        run: |
          curl --fail-with-body --show-error --silent \
            "${{ secrets.VERCEL_BASE }}/api/cron/refresh-status" \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --header "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}"

  generate-meta:
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'generate-meta') || (github.event.schedule == '0 22 * * *' && vars.CRON_ENABLED == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call meta generation endpoint
        run: |
          curl --fail-with-body --show-error --silent \
            "${{ secrets.VERCEL_BASE }}/api/cron/generate-meta" \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --header "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}"

  submit-index:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'submit-index'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Submit sitemap and feed
        run: pnpm tsx scripts/submit-search-index.ts
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.SEARCH_SUBMIT_SITE_URL }}
          SEARCH_SUBMIT_SITE_URL: ${{ secrets.SEARCH_SUBMIT_SITE_URL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_CLIENT_EMAIL: ${{ secrets.GSC_CLIENT_EMAIL }}
          GSC_PRIVATE_KEY: ${{ secrets.GSC_PRIVATE_KEY }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
