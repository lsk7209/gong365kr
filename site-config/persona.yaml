site:
  name: 창업머니맵
  domain: gong365.kr
  tagline: 창업지원사업 공고를 한 화면에서
  meta_priority: naver # title 40자 / description 80자

persona:
  name: 창업 탐색자
  age_range: 25-45
  goals:
    - 내 상황에 맞는 지원사업 빠르게 찾기
    - 마감일 놓치지 않기
    - 신청 자격 미리 점검하기
  pain_points:
    - 여러 사이트 분산, 정보 흩어짐
    - 마감 임박해서 알게 됨
    - 자격 요건 복잡해서 잘 모름
  segments:
    - 예비창업자 (창업 준비 중)
    - 초기창업자 (3년 이하)
    - 소상공인 (운영 중, 정책자금 탐색)

content_strategy:
  tone: 실용적, 명확, 빠른 정보 전달
  avoid:
    - 과장 표현 ("혁신", "최고", "최초")
    - 불필요한 수식어
  keywords_core:
    - 창업지원사업
    - 정책자금
    - 지원사업 공고
    - 창업 지원금
  keywords_long_tail:
    - 창업지원금 신청 자격
    - 마감 임박 지원사업
    - 지역별 창업지원사업
    - 소상공인 정책자금

seo:
  title_max_naver: 40
  description_max_naver: 80
  title_max_google: 60
  description_max_google: 120
  canonical_base: https://gong365.kr
