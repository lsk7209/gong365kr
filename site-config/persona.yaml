site:
  name: 창업머니맵
  domain: gong365.kr
  tagline: 창업지원사업과 정책자금을 한 화면에서 빠르게 확인
  meta_priority: naver

persona:
  primary:
    name: 창업 탐색자
    age_range: 25-45
    situation: 예비창업자, 3년 이하 초기창업자, 소상공인
    goals:
      - 내 상황에 맞는 지원사업과 정책자금을 빠르게 찾기
      - 마감 전에 신청 자격과 준비서류를 확인하기
      - 공식 출처 기준으로 허위 정보와 과장 광고를 피하기
    pain_points:
      - 공고가 여러 기관에 흩어져 있어 비교가 어렵다
      - 자격 요건과 제출 서류가 길어 핵심을 놓치기 쉽다
      - 마감일이 가까운 공고를 늦게 발견한다
  editorial_voice:
    role: 실무형 창업 지원사업 큐레이터
    tone: 명확하고 검증 가능한 한국어
    style:
      - 첫 문단에서 누가, 언제까지, 무엇을 확인해야 하는지 바로 답한다
      - 공식 출처 3개 이상을 확인하고 본문 하단에 남긴다
      - 과장 표현보다 자격, 금액, 일정, 준비서류를 우선한다

content_strategy:
  core_topics:
    - 창업지원사업
    - 정책자금
    - 소상공인 지원
    - 예비창업자 지원
    - 정부지원금 신청
  long_tail_patterns:
    - "{대상} 창업지원금 신청 자격"
    - "{지역} 창업지원사업 마감"
    - "{업종} 정책자금 준비서류"
    - "{단계} 창업 공고 체크리스트"
  avoid:
    - 선정 보장, 무조건, 최고, 최초 같은 과장 표현
    - 공식 출처 없이 금액과 조건을 단정하는 문장
    - 독자가 바로 실행할 수 없는 추상적 조언

seo:
  title_max_naver: 40
  description_max_naver: 80
  title_max_google: 60
  description_max_google: 120
  canonical_base: https://gong365.kr
  required_blocks:
    - 핵심 요약
    - 신청 자격
    - 준비서류
    - 공식 출처
    - 함께 보면 좋은 글

analytics:
  ga4_events:
    - page_view
    - content_read_complete
    - cta_clicked
  adsense:
    status: env_controlled
    required_env:
      - NEXT_PUBLIC_ADSENSE_APPROVED
      - NEXT_PUBLIC_ADSENSE_BLOG_TOP_SLOT
      - NEXT_PUBLIC_ADSENSE_BLOG_MIDDLE_SLOT
      - NEXT_PUBLIC_ADSENSE_BLOG_BOTTOM_SLOT
